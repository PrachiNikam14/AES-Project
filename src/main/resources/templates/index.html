<!DOCTYPE html>
<html>
<head>
    <title>AES Web Tool</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #1e1e3f;
            color: white;
        }
        form {
            margin: 20px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
        }
        button {
            background: #4682B4;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h1>🔐 AES File Encryption Tool</h1>

<h2>Encrypt File</h2>
<form method="post" action="/encrypt" enctype="multipart/form-data">
    <input type="file" name="file" required><br>
    <input type="password" name="password" placeholder="Enter Password" required><br>
    <button type="submit">Encrypt</button>
</form>

<h2>Decrypt File</h2>
<form method="post" action="/decrypt" enctype="multipart/form-data">
    <input type="file" name="file" required><br>
    <input type="password" name="password" placeholder="Enter Password" required><br>
    <button type="submit">Decrypt</button>
</form>

</body>
</html>
